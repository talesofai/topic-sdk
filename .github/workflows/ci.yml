name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # --ignore-scripts 跳过 prepare 的自动构建，下面显式构建以便分步可见
      - name: Install
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Pack tarball
        run: npm pack

      - name: Upload dist + tarball
        uses: actions/upload-artifact@v4
        with:
          name: topic-sdk-${{ github.sha }}
          path: |
            dist
            *.tgz
          if-no-files-found: error

  release:
    # 仅在打 v* tag 时创建 Release（供"从源码/tarball 安装"的消费方下载，不发 npm）
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm build

      - name: Pack tarball
        run: npm pack

      - name: Create GitHub Release with tarball
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tgz"
