<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内嵌页调试宿主 (mock host)</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, "PingFang SC", system-ui, sans-serif; display: flex; height: 100vh; }
      /* 左:模拟宿主壳(固定手机宽 + 44px 顶栏占位 + 同款 sandbox iframe) */
      #stage { width: 390px; flex-shrink: 0; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #fff; }
      #bar { height: 44px; flex-shrink: 0; display: flex; align-items: center; padding: 0 12px; background: #f5f5f7; border-bottom: 1px solid #eee; font-size: 13px; color: #666; }
      #frame { flex: 1; border: none; width: 100%; }
      /* 右:调试面板 */
      #panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
      #ctrls { padding: 10px 14px; border-bottom: 1px solid #eee; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; font-size: 13px; }
      #ctrls input { padding: 4px 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
      #ctrls button { padding: 5px 10px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
      #log { flex: 1; overflow-y: auto; padding: 10px 14px; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; line-height: 1.7; }
      .row { padding: 2px 0; border-bottom: 1px solid #f4f4f4; word-break: break-all; }
      .in { color: #0a7; } .out { color: #06c; } .evt { color: #a06; } .err { color: #c33; } .nav { color: #c60; font-weight: 600; }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="bar">mock 宿主顶栏(44px) · <span id="ctx">未握手</span></div>
      <!-- 与真宿主同款 sandbox:无 allow-top-navigation,原生跳转逃逸/SDK 拦截行为可在此复现 -->
      <iframe id="frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>
    <div id="panel">
      <div id="ctrls">
        <label>hashtag <input id="hashtag" value="梦境列车" size="12" /></label>
        <label>embedToken(空=游客) <input id="token" placeholder="可留空" size="16" /></label>
        <button id="reload">挂载/重载</button>
        <button id="evtToken">推 tokenChanged</button>
        <button id="evtViewport">推 viewport</button>
        <button id="evtBack">推 back</button>
        <button id="clear">清日志</button>
      </div>
      <div id="log"></div>
    </div>
    <script>
      // 本地 mock 宿主:扮演 frame-bridge v2 的宿主侧,让创作者页在"真嵌入上下文"下自测(握手/取 token/导航/事件),
      // 不依赖真 App、不依赖真人。数据走 SDK 的 apiBaseUrl(默认 pre):填 token 看带 viewer 的数据,留空看匿名数据。
      (function () {
        var frame = document.getElementById("frame");
        var logEl = document.getElementById("log");
        var ctxEl = document.getElementById("ctx");
        function log(cls, s) {
          var d = document.createElement("div");
          d.className = "row " + cls;
          d.textContent = s;
          logEl.appendChild(d);
          logEl.scrollTop = logEl.scrollHeight;
        }
        function send(msg) { frame.contentWindow && frame.contentWindow.postMessage(msg, "*"); }
        function reply(id, result) { send({ v: 2, id: id, ok: true, result: result }); log("out", "← ok " + JSON.stringify(result)); }
        function replyErr(id, code, message) { send({ v: 2, id: id, ok: false, error: { code: code, message: message } }); log("err", "← err " + code + " " + message); }
        function pushEvent(event, data) { send({ v: 2, event: event, data: data }); log("evt", "→ event " + event + " " + JSON.stringify(data)); }

        window.addEventListener("message", function (e) {
          if (e.source !== frame.contentWindow) return;
          var m = e.data;
          if (!m || m.v !== 2 || !("id" in m)) return; // 只处理请求(带 id)
          log("in", "→ " + m.method + " " + JSON.stringify(m.params || {}));
          switch (m.method) {
            case "hello":
              ctxEl.textContent = "已握手 (web-embedded)";
              reply(m.id, { client: "web", appVersion: "dev-host", features: [] });
              break;
            case "getEmbedToken": {
              var t = document.getElementById("token").value.trim();
              if (t) reply(m.id, { embedToken: t, expiresAt: Date.now() + 3600e3 });
              else replyErr(m.id, "auth-required", "dev-host: 无 token(游客态,数据匿名)");
              break;
            }
            case "nav.internal":
              log("nav", "[nav.internal] route=" + (m.params && m.params.route) + " query=" + JSON.stringify((m.params && m.params.query) || {}) + "  (真宿主会跳 App 内此页)");
              reply(m.id, null);
              break;
            case "nav.external":
              log("nav", "[nav.external] url=" + (m.params && m.params.url));
              reply(m.id, null);
              break;
            case "ui.toast":
              log("evt", "[toast] " + (m.params && m.params.text));
              reply(m.id, null);
              break;
            case "ui.viewport":
              reply(m.id, { safeTop: 0, safeBottom: 0, keyboardInset: 0, width: frame.clientWidth, height: frame.clientHeight });
              break;
            default:
              replyErr(m.id, "method-not-found", m.method);
          }
        });

        function mount() {
          ctxEl.textContent = "未握手";
          var h = encodeURIComponent(document.getElementById("hashtag").value.trim());
          frame.src = "/?hashtag=" + h + "&_t=" + Date.now();
          log("evt", "挂载 iframe: /?hashtag=" + h);
        }
        document.getElementById("reload").onclick = mount;
        document.getElementById("clear").onclick = function () { logEl.innerHTML = ""; };
        document.getElementById("evtToken").onclick = function () { pushEvent("tokenChanged", { token: null }); };
        document.getElementById("evtViewport").onclick = function () {
          pushEvent("viewport", { safeTop: 0, safeBottom: 0, keyboardInset: 0, width: frame.clientWidth, height: frame.clientHeight });
        };
        document.getElementById("evtBack").onclick = function () { pushEvent("back", {}); };
        mount();
      })();
    </script>
  </body>
</html>
